<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>👶 Baby Shower Trivia!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;900&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --pink:#E44C3D;   /* Sienna */
    --blue:#6AA2C8;   /* Azure */
    --yellow:#FFBE2D; /* Marigold */
    --green:#51AF7B;  /* Sage */
    --purple:#47293A; /* Mulberry */
    --cream:#FFFBC0;  /* Buttercream */
    --dark:#2D2D2D;
    --carmine:#93212F;
    --evergreen:#325048;
    --stone:#978D85;
    --frost:#D6ECF0;
  }
  body {
    background: var(--cream);
    background-image:
      radial-gradient(circle at 20% 20%, rgba(81,175,123,0.12) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(106,162,200,0.12) 0%, transparent 50%);
    min-height:100vh; font-family:'Nunito',sans-serif;
    color:var(--dark); overflow:hidden;
  }
  .bg-stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
  .star { position:absolute; font-size:1.2rem; animation:floatStar linear infinite; opacity:0.4; }
  @keyframes floatStar {
    0%   { transform:translateY(110vh) rotate(0deg); opacity:0; }
    10%  { opacity:0.4; } 90% { opacity:0.4; }
    100% { transform:translateY(-10vh) rotate(360deg); opacity:0; }
  }
  .screen { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:10; transition:opacity 0.4s; }
  .screen.hidden { opacity:0; pointer-events:none; }
  .panel {
    background:white; border:4px solid var(--dark); border-radius:20px;
    padding:36px; box-shadow:8px 8px 0 var(--dark);
    max-width:520px; width:90%; text-align:center; position:relative; z-index:10;
    max-height:92vh; overflow-y:auto;
  }
  .game-title { font-family:'Press Start 2P',monospace; font-size:1rem; color:#93212F; text-shadow:3px 3px 0 var(--dark); margin-bottom:6px; line-height:1.6; }
  .game-subtitle { font-size:0.85rem; color:#888; margin-bottom:24px; }
  label { display:block; text-align:left; font-weight:700; margin-bottom:4px; font-size:0.9rem; }
  input[type=text] {
    width:100%; padding:10px 14px; border:3px solid var(--dark); border-radius:10px;
    font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700;
    margin-bottom:14px; outline:none; background:var(--cream);
  }
  input[type=text]:focus { border-color:var(--pink); }
  .color-grid { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
  .color-btn { width:36px; height:36px; border-radius:50%; border:3px solid transparent; cursor:pointer; transition:transform 0.15s,border-color 0.15s; }
  .color-btn.selected { border-color:var(--dark); transform:scale(1.25); }
  .avatar-grid { display:flex; gap:12px; justify-content:center; margin-bottom:20px; }
  .avatar-btn { width:68px; height:68px; border:3px solid transparent; border-radius:12px; cursor:pointer; background:var(--cream); display:flex; align-items:center; justify-content:center; transition:transform 0.15s,border-color 0.15s; }
  .avatar-btn.selected { border-color:var(--dark); transform:scale(1.15); background:#fff; }
  .btn { display:inline-block; padding:12px 28px; border:3px solid var(--dark); border-radius:12px; font-family:'Press Start 2P',monospace; font-size:0.65rem; cursor:pointer; transition:transform 0.1s,box-shadow 0.1s; box-shadow:4px 4px 0 var(--dark); margin:4px; line-height:1.6; }
  .btn:active { transform:translate(3px,3px); box-shadow:1px 1px 0 var(--dark); }
  .btn-pink   { background:var(--pink);   color:white; }
  .btn-green  { background:var(--green);  color:white; }
  #lobby-screen .room-code-display { font-family:'Press Start 2P',monospace; font-size:1.8rem; color:#325048; background:var(--cream); border:4px dashed #325048; border-radius:12px; padding:14px 24px; margin:14px 0; letter-spacing:6px; }
  .player-chips { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:12px 0; }
  .chip { padding:6px 14px; border-radius:50px; font-weight:700; font-size:0.85rem; border:2px solid var(--dark); }
  #game-screen { flex-direction:column; align-items:center; justify-content:flex-start; padding-top:8px; background:linear-gradient(180deg,#D6ECF0 0%,#FFFBC0 60%,#fff 100%); }
  #game-canvas { border:4px solid var(--dark); border-radius:12px; box-shadow:8px 8px 0 var(--dark); image-rendering:pixelated; display:block; }
  #hud { width:800px; max-width:100vw; display:flex; align-items:center; justify-content:space-between; padding:6px 0; gap:10px; }
  #timer-display { font-family:'Press Start 2P',monospace; font-size:1rem; color:var(--dark); background:var(--yellow); border:3px solid var(--dark); border-radius:10px; padding:5px 12px; min-width:60px; text-align:center; }
  #question-hud { font-family:'Press Start 2P',monospace; font-size:0.9rem; color:var(--dark); text-align:center; flex:1; line-height:2; }
  #score-display { font-family:'Press Start 2P',monospace; font-size:0.55rem; color:#325048; background:white; border:3px solid var(--dark); border-radius:10px; padding:5px 10px; text-align:right; }
  #scoreboard-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:100; opacity:0; pointer-events:none; transition:opacity 0.3s; }
  #scoreboard-overlay.visible { opacity:1; pointer-events:all; }
  .score-panel { background:white; border:4px solid var(--dark); border-radius:20px; padding:28px; box-shadow:8px 8px 0 var(--dark); max-width:400px; width:90%; text-align:center; }
  .score-panel h2 { font-family:'Press Start 2P',monospace; font-size:0.85rem; color:#93212F; margin-bottom:18px; }
  .score-row { display:flex; align-items:center; gap:12px; padding:7px 0; border-bottom:2px dashed #eee; font-weight:700; }
  .score-rank { font-family:'Press Start 2P',monospace; font-size:0.7rem; width:24px; }
  .score-name { flex:1; text-align:left; font-size:0.9rem; }
  .score-pts  { font-family:'Press Start 2P',monospace; font-size:0.7rem; color:#325048; }
  #controls-hint { font-family:'Press Start 2P',monospace; font-size:0.42rem; color:#888; text-align:center; padding:3px 0; }
  #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--dark); color:white; padding:10px 22px; border-radius:30px; font-weight:700; z-index:999; opacity:0; transition:opacity 0.3s; pointer-events:none; }
  #toast.show { opacity:1; }
  #mobile-controls { display:none; position:fixed; bottom:12px; right:12px; z-index:200; }
  .dpad { display:grid; grid-template-columns:repeat(3,44px); grid-template-rows:repeat(3,44px); gap:3px; }
  .dpad-btn { background:rgba(255,255,255,0.92); border:3px solid var(--dark); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:1.2rem; cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent; }
  .dpad-btn:active { background:var(--yellow); }
  @media(max-width:820px) { #mobile-controls{display:block;} #game-canvas{width:100vw;height:auto;} #hud{width:100vw;padding:4px 6px;} #question-hud{font-size:0.65rem;} }
</style>
</head>
<body>
<div class="bg-stars" id="bgStars"></div>

<!-- SCREEN 1: Join -->
<div class="screen" id="join-screen">
  <div class="panel">
    <div class="game-title">👶 Baby Shower<br>Trivia!</div>
    <div class="game-subtitle">The pixel-art nursery platformer 🍼</div>
    <label for="playerName">Your Name</label>
    <input type="text" id="playerName" placeholder="Mama, Papa, Aunt Sue…" maxlength="16"/>
    <label>Pick Your Color</label>
    <div class="color-grid" id="colorGrid"></div>
    <label>Choose Your Baby Avatar</label>
    <div class="avatar-grid" id="avatarGrid"></div>
    <label for="roomCodeInput">Room Code (leave blank to create)</label>
    <input type="text" id="roomCodeInput" placeholder="e.g. AB12C" maxlength="5" style="text-transform:uppercase;letter-spacing:4px;"/>
    <button class="btn btn-pink" id="joinBtn">🍼 Join / Create Room</button>
  </div>
</div>

<!-- SCREEN 2: Lobby -->
<div class="screen hidden" id="lobby-screen">
  <div class="panel">
    <div class="game-title" style="font-size:0.75rem;">🎀 Waiting Room</div>
    <p style="margin:10px 0 4px;font-weight:700;font-size:0.9rem;">Share this code:</p>
    <div class="room-code-display" id="displayRoomCode">—</div>
    <p style="font-size:0.8rem;color:#888;margin-bottom:14px;">Go to <strong id="shareUrl"></strong> and enter the code above!</p>
    <div class="player-chips" id="lobbyPlayers"></div>
    <div id="hostControls" style="margin-top:14px;display:none;">
      <button class="btn btn-green" id="startBtn">▶ Start Game</button>
    </div>
    <p id="waitingMsg" style="font-size:0.85rem;color:#aaa;margin-top:10px;">Waiting for host to start…</p>
  </div>
</div>

<!-- SCREEN 3: Game -->
<div class="screen hidden" id="game-screen">
  <div id="hud">
    <div id="timer-display">15</div>
    <div id="question-hud">Get ready!</div>
    <div id="score-display">Score: 0</div>
  </div>
  <canvas id="game-canvas" width="800" height="500" tabindex="0"></canvas>
  <div id="controls-hint">A/D or ← → = Move &nbsp;|&nbsp; W or SPACE = Jump &nbsp;|&nbsp; S or ↓ = Drop down</div>
</div>

<!-- Scoreboard -->
<div id="scoreboard-overlay">
  <div class="score-panel">
    <h2 id="scoreboard-title">Scores</h2>
    <div id="scoreboard-list"></div>
    <button class="btn btn-pink" id="scoreboard-ok" style="margin-top:18px;">Next ▶</button>
  </div>
</div>

<!-- Mobile controls -->
<div id="mobile-controls">
  <div class="dpad">
    <div></div>
    <div class="dpad-btn" id="mb-up">⬆</div>
    <div></div>
    <div class="dpad-btn" id="mb-left">⬅</div>
    <div></div>
    <div class="dpad-btn" id="mb-right">➡</div>
    <div></div>
    <div></div>
    <div></div>
  </div>
</div>

<div id="toast"></div>
<script src="/socket.io/socket.io.js"></script>

const S = 3; // preview scale
const GS = 3; // game scale (avatar px size)

// Draw avatar with player color overriding palette index 1
function drawAvatar(ctx, def, x, y, scale, playerColor) {
  def.pixels.forEach((row, ry) => row.forEach((c, rx) => {
    if (c === 0) return;
    ctx.fillStyle = (c === 1 && playerColor) ? playerColor : def.palette[c];
    ctx.fillRect(x + rx*scale, y + ry*scale, scale, scale);
  }));
}
function renderAvatarCanvas(def, size, playerColor) {
  const c = document.createElement('canvas');
  c.width=8*S; c.height=10*S;
  c.style.width=size+'px'; c.style.height=(size*10/8)+'px';
  c.style.imageRendering='pixelated';
  drawAvatar(c.getContext('2d'), def, 0, 0, S, playerColor);
  return c;
}

function drawBottles(ctx, ts) {

function checkBottleCollection(ph) {

const ZONE_LABEL=['A','B','C','D'];


function getZone(px, py, pw, ph) {
  for (const p of PLATFORMS) {
    if (p.type!=='zone') continue;
    if (px+pw>p.x && px<p.x+p.w && py+ph>=p.y-2 && py+ph<=p.y+10) return p.zone;
  }
  return -1;
}

function applyPhysics(ph) {
  ph.vy += GRAVITY;
  ph.y  += ph.vy;
  ph.x  += ph.vx;
  if (ph.x < 0) { ph.x=0; ph.vx=0; }
  if (ph.x+ph.w > W) { ph.x=W-ph.w; ph.vx=0; }
  ph.onGround = false;
  for (const plat of PLATFORMS) {
    const prevBot = ph.y + ph.h - ph.vy;
    const currBot = ph.y + ph.h;
    const inX = ph.x+ph.w > plat.x+4 && ph.x < plat.x+plat.w-4;
    if (inX && prevBot<=plat.y+2 && currBot>=plat.y && !ph.dropThrough) {
      ph.y=plat.y-ph.h; ph.vy=0; ph.onGround=true;
    }
  }
  // Decay dropThrough timer
  if (ph.dropThrough) { ph.dropThrough--; }
  if (ph.y > H+60) { ph.y=50; ph.x=W/2; ph.vy=0; }
}

let particles=[];
function spawnParticles(x, y, type, n=10) {
  const confettiColors=['#93212F','#E44C3D','#FFBE2D','#51AF7B','#325048','#6AA2C8','#47293A','#978D85'];
  for (let i=0;i<n;i++) {
    const angle=(i/n)*Math.PI*2+Math.random();
    const spd=type==='confetti'?2+Math.random()*5:1.5+Math.random()*3;
    const isConfetti = type==='confetti';
    const emojis = type==='wrong' ? ['💧','🥛','💦','😅'] : ['💕','😄','✨'];
    particles.push({
      x,y,
      vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd-(isConfetti?3:1.5),
      life:1, decay:isConfetti?0.012+Math.random()*0.015:0.018+Math.random()*0.02,
      isConfetti,
      color: isConfetti ? confettiColors[Math.floor(Math.random()*confettiColors.length)] : '#fff',
      emoji: isConfetti ? null : emojis[Math.floor(Math.random()*emojis.length)],
      size: isConfetti ? 6+Math.random()*6 : 13+Math.random()*10,
      w: isConfetti ? 5+Math.random()*5 : 0,
      rot:Math.random()*6, rotV:(Math.random()-0.5)*(isConfetti?0.3:0.18),
    });
  }
}
function tickParticles() {
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life-=p.decay; p.rot+=p.rotV; });
}
function drawParticles(ctx) {
  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    if(p.isConfetti){
      ctx.fillStyle=p.color;
      ctx.fillRect(-p.w/2,-p.size/2,p.w,p.size);
    } else {
      ctx.font=p.size+'px serif';
      ctx.fillText(p.emoji,-p.size/2,p.size/2);
    }
    ctx.restore();
  });
}

let audioCtx=null;
function getAC(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function tone(freq,type='sine',dur=0.15,vol=0.15,delay=0){
  try{
    const ac=getAC(), osc=ac.createOscillator(), g=ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.type=type; osc.frequency.value=freq;
    const t=ac.currentTime+delay;
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    osc.start(t); osc.stop(t+dur+0.05);
  }catch(e){}
}

function ensurePh(id, x, y) {
  if (!physics[id]) physics[id]={x:x||W/2,y:y||60,vx:0,vy:0,w:24,h:30,onGround:false,facingRight:true,walkF:0,walkT:0};
  return physics[id];
}

//  SOCKET
// ═══════════════════════════════════════
function connect() {
  socket=io();
  socket.on('connect',()=>{ myId=socket.id; });
  socket.on('roomCreated',({roomCode:rc})=>{ roomCode=rc; isHost=true; showLobby(); });
  socket.on('roomJoined', ({roomCode:rc})=>{ roomCode=rc; isHost=false; showLobby(); });
  socket.on('newHost',({host})=>{ isHost=host===myId; updateLobbyUI(); });

  socket.on('roomUpdate',data=>{
    players={};
    data.players.forEach(p=>{ players[p.id]=p; ensurePh(p.id,p.x,p.y); });
    isHost=data.host===myId; gameState=data.state;
    updateLobbyUI(); updateMyScore();
  });

  socket.on('newQuestion',data=>{
    currentQuestion=data; timerEnd=Date.now()+data.duration;
    gameState='question'; particles=[];
    // Swap to the map for this question index
    PLATFORMS = ALL_MAPS[data.index % ALL_MAPS.length];
    spawnBottles(data.index); popups=[];
    // Spread players at ground
    const ids=Object.keys(players);
    ids.forEach((id,i)=>{
      const ph=ensurePh(id);
      ph.x=80+(i/Math.max(ids.length-1,1))*640; ph.y=410; ph.vx=0; ph.vy=0;
    });
    showGameScreen(); updateHUD(); startTimer(); hideScoreboard(); canvas.focus();
  });

  socket.on('questionReveal',data=>{
    gameState='reveal'; stopTimer();
    if(currentQuestion) currentQuestion.correct=data.correct;
    let anyCorrect=false, anyWrong=false;
    data.scores.forEach(p=>{
      if(players[p.id]){ players[p.id].score=p.score; players[p.id].correct=p.correct; }
    });
    Object.values(players).forEach(p=>{
      const ph=physics[p.id]; if(!ph) return;
      if(p.correct){ anims[p.id]={type:'correct',t0:Date.now(),dur:2600,sy:ph.y}; spawnParticles(ph.x+12,ph.y,'confetti',28); anyCorrect=true; }
      else          { anims[p.id]={type:'wrong',  t0:Date.now(),dur:2000,sy:ph.y}; spawnParticles(ph.x+12,ph.y,'wrong',12);   anyWrong=true;   }
    });
    if(anyCorrect) correctChime();
    if(anyWrong) setTimeout(wrongSound,300);
    updateMyScore();
    setTimeout(()=>showScoreboard('📊 After Round '+(currentQuestion.index+1)),3000);
  });

  socket.on('playerMoved',({id,x,y,vx,vy,fr,zone})=>{
    if(players[id]) players[id].zone=zone;
    const ph=ensurePh(id);
    // Use direct position for remote players so collision detection sees accurate locations
    ph.x=x; ph.y=y;
    ph.vx=vx||0; ph.vy=vy||0; ph.facingRight=fr;
  });

  socket.on('bottleCollected', ({bottleId, collectorId, score}) => {
    const b = bottles.find(b => b.id === bottleId);
    if (b) {
      b.collected = true;
      if (collectorId !== myId) popups.push({x: b.x, y: b.y-10, life: 1.0});
    }
    if (players[collectorId]) players[collectorId].score = score;
    if (collectorId === myId) { myScore = score; updateMyScore(); }
  });

  socket.on('gameOver',data=>{
    gameState='gameover'; stopTimer();
    data.scores.forEach(p=>{ if(players[p.id]) players[p.id].score=p.score; });
    showScoreboard('🏆 Final Scores!',true);
  });

  socket.on('error',msg=>toast('❌ '+msg));

  socket.on('disconnect',()=>{
    toast('⚠️ Connection lost — reconnecting...');
  });
  socket.on('reconnect',()=>{
    toast('✅ Reconnected!');
    // Rejoin the room automatically if we have a code
    if(roomCode) socket.emit('rejoinRoom',{ roomCode, id: myId });
  });
}

//  GAME LOOP
// ═══════════════════════════════════════
let lastSent=0, lastTs=0;

function gameLoop(ts) {
  requestAnimationFrame(gameLoop);
  const dt=Math.min(ts-lastTs,50); lastTs=ts;

  if(gameState==='question' && myId && physics[myId]){
    const ph=physics[myId];

    // Input velocity (separate from bounce impulse)
    let inputVx=0;
    if(keys['ArrowLeft']||keys['a']||keys['A']||keys['left'])  { inputVx=-SPEED; ph.facingRight=false; }
    if(keys['ArrowRight']||keys['d']||keys['D']||keys['right']) { inputVx= SPEED; ph.facingRight=true;  }

    // Drop through platform with S or ArrowDown
    if((keys['ArrowDown']||keys['s']||keys['S']||keys['down']) && ph.onGround) {
      ph.dropThrough = 12; // ignore platforms for 12 frames
      ph.vy = 2;
    }

    // bounceVx decays quickly — fades out over ~300ms
    if(!ph.bounceVx) ph.bounceVx=0;
    ph.bounceVx *= 0.75;
    if(Math.abs(ph.bounceVx)<0.1) ph.bounceVx=0;

    // Combined: bounce overrides input while active
    ph.vx = Math.abs(ph.bounceVx)>0.5 ? ph.bounceVx : inputVx;

    // Walk animation
    if(ph.vx!==0&&ph.onGround){ ph.walkT+=dt; if(ph.walkT>110){ph.walkF=(ph.walkF+1)%2;ph.walkT=0;} }
    else if(ph.onGround) ph.walkF=0;

    applyPhysics(ph);

    const zone=getZone(ph.x,ph.y,ph.w,ph.h);
    if(players[myId]) players[myId].zone=zone;

    checkBottleCollection(ph);
    if(ts-lastSent>100&&socket){
      socket.emit('playerMove',{x:ph.x,y:ph.y,zone});
      lastSent=ts;
    }
  }

  // Animate reveal
  if(gameState==='reveal'){
    Object.entries(anims).forEach(([id,a])=>{
      const ph=physics[id]; if(!ph) return;
      const t=Math.min(1,(Date.now()-a.t0)/a.dur);
      if(a.type==='correct') { ph.y=a.sy-t*160; ph.vy=0; }
      else                    { ph.y=a.sy+t*t*180; ph.vy=0; }
    });
  }

  tickParticles();
  draw(ts);
}

  // Clouds
  [[70,55,80,32],[300,38,100,38],[560,65,70,28],[720,42,80,32]].forEach(([x,y,w,h],i)=>{

function drawCloud(ctx,x,y,w,h){
  ctx.fillStyle='rgba(214,236,240,0.9)';
  ctx.beginPath(); ctx.ellipse(x,y,w/2,h/2,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x-w*.25,y+h*.1,w*.3,h*.4,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+w*.25,y+h*.1,w*.3,h*.4,0,0,Math.PI*2); ctx.fill();
}

function drawMobile(ctx,x,y,ts){
  ctx.strokeStyle='#bbb'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y+35); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-55,y+35); ctx.lineTo(x+55,y+35); ctx.stroke();
  [[x-55,y+35,-1],[x,y+35,1],[x+55,y+35,-1]].forEach(([mx,my,d],i)=>{
    const sw=Math.sin(ts/1400+i)*7*d;
    ctx.beginPath(); ctx.moveTo(mx,my); ctx.lineTo(mx+sw,my+30); ctx.stroke();
    ctx.font='16px serif'; ctx.fillText(['🌙','⭐','🍼'][i],mx+sw-8,my+46);
  });
}

function drawPlatforms(ctx,ts){
  PLATFORMS.forEach(p=>{
    if(p.type==='ground'||p.type==='step'){
      ctx.fillStyle='#325048'; ctx.fillRect(p.x,p.y,p.w,p.h);
      ctx.fillStyle='#51AF7B'; ctx.fillRect(p.x,p.y,p.w,p.h-5);
      ctx.strokeStyle='#25392F'; ctx.lineWidth=1;
      for(let px=p.x+30;px<p.x+p.w;px+=30){ ctx.beginPath(); ctx.moveTo(px,p.y); ctx.lineTo(px,p.y+p.h); ctx.stroke(); }
    } else if(p.type==='zone'){
      const zi=p.zone;
      const isCorrectReveal=gameState==='reveal'&&currentQuestion&&zi===currentQuestion.correct;
      const pulse=isCorrectReveal?0.6+0.4*Math.sin(ts/110):1;

      // Glow for correct
      if(isCorrectReveal){
        ctx.fillStyle=`rgba(255,215,0,${0.25*pulse})`;
        roundRect(ctx,p.x-6,p.y-6,p.w+12,p.h+12,10); ctx.fill();
      }

      ctx.fillStyle=isCorrectReveal?'#FFD700':ZONE_LIGHT[zi];
      roundRect(ctx,p.x,p.y,p.w,p.h,6); ctx.fill();
      ctx.strokeStyle=isCorrectReveal?'#FFA500':ZONE_COLORS[zi]; ctx.lineWidth=3;
      roundRect(ctx,p.x,p.y,p.w,p.h,6); ctx.stroke();





      // Answer text — drawn above the platform for visibility
      if(currentQuestion&&currentQuestion.answers[zi]){
        ctx.fillStyle='#1a1a1a';
        ctx.font='bold 15px Nunito,sans-serif';
        wrapText(ctx,currentQuestion.answers[zi],p.x+6,p.y-28,p.w-12,15);
      }
    }
  });
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawPlayerChar(ctx,p,ts){
  const ph=physics[p.id]; if(!ph) return;
  const def=AVATAR_DEFS[p.avatar]||AVATAR_DEFS[0];
  const anim=anims[p.id];
  let dx=ph.x, dy=ph.y;

  ctx.save();

  // Reveal animation
  if(anim&&gameState==='reveal'){
    const t=Math.min(1,(Date.now()-anim.t0)/anim.dur);
    if(anim.type==='correct'){
      // Bounce in place happily
      dy=anim.sy + Math.sin(t*Math.PI*4)*-8;
      // Party hat wobbles on head
      ctx.save();
      ctx.font='26px serif';
      ctx.textAlign='center';
      ctx.translate(ph.x+12, dy-4);
      ctx.rotate(Math.sin(t*Math.PI*6)*0.18);
      ctx.fillText('🎉', -13, 0);
      ctx.restore();
      ctx.globalAlpha=Math.max(0,1-t*0.2);
    } else {
      dy=anim.sy+t*t*200;
      ctx.globalAlpha=Math.max(0,1-t*1.5);
      // Spin
      ctx.translate(ph.x+12,dy+15); ctx.rotate(t*Math.PI*2); ctx.translate(-(ph.x+12),-(dy+15));
      // Milk splash
      if(t>0.25){
        ctx.fillStyle=`rgba(255,255,255,${0.7*(1-t)})`;
        for(let j=0;j<7;j++){
          const a=(j/7)*Math.PI*2, r=t*45;
          ctx.beginPath(); ctx.arc(ph.x+12+Math.cos(a)*r,dy+15+Math.sin(a)*r,5,0,Math.PI*2); ctx.fill();
        }
      }
    }
  }

  // Shadow
  const shadowAlpha=ctx.globalAlpha*0.2;
  ctx.fillStyle=`rgba(0,0,0,${shadowAlpha})`;
  ctx.beginPath(); ctx.ellipse(ph.x+12, ph.y+ph.h+2, 13, 4, 0, 0, Math.PI*2); ctx.fill();

  // Squash/stretch on jump
  const sqX=ph.onGround?1:(ph.vy<0?1.15:0.9);
  const sqY=ph.onGround?1:(ph.vy<0?0.88:1.1);
  const bob=(ph.onGround&&ph.vx!==0)?Math.sin(ts/80)*2:0;

  ctx.save();
  if(!ph.facingRight){ ctx.translate(dx+ph.w,0); ctx.scale(-1,1); dx=0; }
  ctx.translate(ph.facingRight?dx+12:12, dy+ph.h/2+bob);
  ctx.scale(sqX,sqY);
  ctx.translate(ph.facingRight?-(dx+12):-12, -(dy+ph.h/2+bob));
  drawAvatar(ctx, def, ph.facingRight?dx:0, dy, GS, p.color);
  ctx.restore();

  ctx.restore();

  // Name label
  const nx=ph.x+12, ny=ph.y-8+bob;
  ctx.save();
  ctx.font=`bold ${p.id===myId?12:10}px Nunito,sans-serif`;
  ctx.textAlign='center';
  ctx.strokeStyle='white'; ctx.lineWidth=3; ctx.strokeText(p.name,nx,ny);
  ctx.fillStyle=p.color||'#333'; ctx.fillText(p.name,nx,ny);
  if(p.id===myId){
    ctx.font="bold 8px 'Press Start 2P',monospace";
    ctx.strokeStyle=p.color||'#333'; ctx.lineWidth=2;
    ctx.strokeText('▼',nx,ny-12); ctx.fillStyle='white'; ctx.fillText('▼',nx,ny-12);
  }
  ctx.restore();
  ctx.textAlign='left';
}

function draw(ts){
  ctx.clearRect(0,0,W,H);
  drawBg(ctx,ts);

  if(gameState==='lobby'||gameState==='waiting'){
    drawPlatforms(ctx,ts);
    ctx.font="bold 14px 'Press Start 2P',monospace";
    ctx.textAlign='center';
    ctx.strokeStyle=ZONE_COLORS[0]; ctx.lineWidth=4; ctx.strokeText('Waiting for players…',W/2,155);
    ctx.fillStyle='#325048'; ctx.fillText('Waiting for players…',W/2,155);
    ctx.textAlign='left';
    Object.values(players).forEach((p,i)=>{ ensurePh(p.id,100+i*130,410); drawPlayerChar(ctx,p,ts); });
    return;
  }

  drawPlatforms(ctx,ts);

  // Timer bar
  if(gameState==='question'&&timerEnd){
    const frac=Math.max(0,(timerEnd-Date.now())/15000);
    ctx.fillStyle='rgba(0,0,0,0.12)'; ctx.fillRect(0,H-8,W,8);
    ctx.fillStyle=frac>0.4?'#06D6A0':frac>0.2?'#FFD166':'#FF6B9D';
    ctx.fillRect(0,H-8,W*frac,8);
  }

  drawParticles(ctx);
  drawBottles(ctx, ts);
  Object.values(players).forEach(p=>drawPlayerChar(ctx,p,ts));

  
}

// ═══════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════
function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
function showLobby(){ showScreen('lobby-screen'); document.getElementById('displayRoomCode').textContent=roomCode; updateLobbyUI(); }
function showGameScreen(){ showScreen('game-screen'); canvas.focus(); document.getElementById('mobile-controls').style.display=''; }
function updateLobbyUI(){
  if(!roomCode) return;
  const ch=document.getElementById('lobbyPlayers'); ch.innerHTML='';
  Object.values(players).forEach(p=>{
    const d=document.createElement('div'); d.className='chip';
    d.style.background=p.color+'33'; d.style.borderColor=p.color;
    d.textContent=(isHost&&p.id===myId?'👑 ':'')+p.name; ch.appendChild(d);
  });
  document.getElementById('hostControls').style.display=isHost?'':'none';
  document.getElementById('waitingMsg').style.display=isHost?'none':'';
}
function updateHUD(){
  if(!currentQuestion) return;
  document.getElementById('question-hud').textContent=`Q${currentQuestion.index+1}/${currentQuestion.total}: ${currentQuestion.question}`;
}
function updateMyScore(){ const me=players[myId]; if(me) myScore=me.score; document.getElementById('score-display').textContent='Score: '+myScore; }
function startTimer(){
  stopTimer();
  timerInterval=setInterval(()=>{
    const rem=Math.max(0,Math.ceil((timerEnd-Date.now())/1000));
    const el=document.getElementById('timer-display');
    el.textContent=rem; el.style.background=rem<=5?'var(--pink)':'var(--yellow)'; el.style.color=rem<=5?'white':'var(--dark)';
    if(rem<=5&&rem>0) tone(440+rem*25,'square',0.05,0.06);
    if(rem===0) stopTimer();
  },100);
}
function stopTimer(){ clearInterval(timerInterval); timerInterval=null; }
function showScoreboard(title,isFinal){
  document.getElementById('scoreboard-title').textContent=title;
  const list=document.getElementById('scoreboard-list'); list.innerHTML='';
  // Show correct answer banner
  if(!isFinal && currentQuestion){
    const banner=document.createElement('div');
    banner.style.cssText='background:#FFBE2D;border:3px solid #2D2D2D;border-radius:10px;padding:10px 14px;margin-bottom:14px;text-align:center;';
    banner.innerHTML=`<div style="font-size:0.5rem;font-family:\'Press Start 2P\',monospace;color:#2D2D2D;margin-bottom:4px;">✅ Correct Answer</div><div style="font-size:1rem;font-weight:900;font-family:\'Nunito\',sans-serif;color:#325048;">${currentQuestion.answers[currentQuestion.correct]}</div>`;
    list.appendChild(banner);
  }
  Object.values(players).sort((a,b)=>b.score-a.score).forEach((p,i)=>{
    const r=document.createElement('div'); r.className='score-row';
    r.innerHTML=`<div class="score-rank">${['🥇','🥈','🥉'][i]||i+1}</div><div class="score-name" style="color:${p.color}">${p.name}</div><div class="score-pts">${p.score}pts</div>`;
    list.appendChild(r);
  });
  const ok=document.getElementById('scoreboard-ok');
  if(isFinal){
    ok.textContent='🎉 Play Again';
    ok.onclick=()=>location.reload();
  } else {
    ok.style.display='';
    ok.textContent='Next ▶';
    ok.onclick=()=>hideScoreboard();
    // Auto-dismiss after 8s so game never gets stuck
    clearTimeout(window._autoAdvance);
    window._autoAdvance = setTimeout(()=>hideScoreboard(), 8000);
  }
  document.getElementById('scoreboard-overlay').classList.add('visible');
}
function hideScoreboard(){ clearTimeout(window._autoAdvance); document.getElementById('scoreboard-overlay').classList.remove('visible'); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
function wrapText(ctx,text,x,y,mw,lh){
  const words=text.split(' '); let line='';
  for(let i=0;i<words.length;i++){
    const test=line+words[i]+' ';
    if(ctx.measureText(test).width>mw&&i>0){ ctx.fillText(line,x,y); line=words[i]+' '; y+=lh; } else line=test;
  }
  ctx.fillText(line,x,y);
}

// ═══════════════════════════════════════
//  BUTTONS
// ═══════════════════════════════════════
document.getElementById('joinBtn').onclick=()=>{
  const name=document.getElementById('playerName').value.trim();
  const code=document.getElementById('roomCodeInput').value.trim().toUpperCase();
  if(!name){ toast('Enter your name first!'); return; }
  connect();
  socket.on('connect',()=>{
    if(code) socket.emit('joinRoom',{roomCode:code,name,color:selectedColor,avatar:selectedAvatar});
    else     socket.emit('createRoom',{name,color:selectedColor,avatar:selectedAvatar});
  });
};
document.getElementById('startBtn').onclick=()=>{ if(socket&&isHost) socket.emit('startGame'); };

const urlParams=new URLSearchParams(window.location.search);
const pc=urlParams.get('room');
if(pc) document.getElementById('roomCodeInput').value=pc.toUpperCase();

requestAnimationFrame(gameLoop);
</script>
